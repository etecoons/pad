<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RustPad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tell Trunk to copy the Assets folder directly into the dist output -->
    <link data-trunk rel="copy-dir" href="Assets"/>
    <link data-trunk rel="copy-file" href="service-worker.js"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="Assets/rustpad.svg">
    <link rel="alternate icon" type="image/png" href="Assets/rustpad.png">
    <link rel="apple-touch-icon" href="Assets/rustpad.png">
    <link data-trunk rel="css" href="Assets/base.css">
    <link data-trunk rel="css" href="Assets/header.css">
    <link data-trunk rel="css" href="Assets/login.css">
    <link data-trunk rel="css" href="Assets/app.css">
    <link data-trunk rel="css" href="Assets/preview-styles.css">
    <link rel="manifest" href="Assets/manifest.json">
    <script>
        // Prevent theme flicker by setting theme immediately
        (function() {
            let theme = localStorage.getItem('theme') || 'dark';
            if (theme.startsWith('"') && theme.endsWith('"')) {
                theme = theme.slice(1, -1);
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
</body>
</html>
